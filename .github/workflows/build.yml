name: Build Installers

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: rust-macos-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: rust-macos-

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Stage backend
        run: |
          RESOURCES_DIR=frontend/src-tauri/resources
          rm -rf "$RESOURCES_DIR/backend"
          mkdir -p "$RESOURCES_DIR/backend"
          cp -r backend/src "$RESOURCES_DIR/backend/src"
          cp backend/package.json "$RESOURCES_DIR/backend/"
          cp backend/bun.lock "$RESOURCES_DIR/backend/" 2>/dev/null || true
          if [ -d backend/native ]; then cp -r backend/native "$RESOURCES_DIR/backend/native"; fi
          cd "$RESOURCES_DIR/backend" && bun install --frozen-lockfile 2>/dev/null || bun install

      - name: Prune bundled node_modules
        run: |
          NM=frontend/src-tauri/resources/backend/node_modules
          ARCH=$(uname -m)

          # Remove other-platform native binaries
          find "$NM" -type d \( -name "linux" -o -name "win32" -o -name "win" \) -exec rm -rf {} + 2>/dev/null || true
          case "$ARCH" in
            arm64)
              find "$NM" -type f -name "*x64*" \( -name "*.node" -o -name "*.dylib" -o -name "*.so" \) -delete 2>/dev/null || true
              find "$NM" -type d -name "x64" -exec rm -rf {} + 2>/dev/null || true
              ;;
            x86_64)
              find "$NM" -type f -name "*arm64*" \( -name "*.node" -o -name "*.dylib" -o -name "*.so" \) -delete 2>/dev/null || true
              find "$NM" -type d -name "arm64" -exec rm -rf {} + 2>/dev/null || true
              ;;
          esac

          # Remove .bin symlinks (bun resolves modules directly, broken symlinks crash Tauri bundler)
          rm -rf "$NM/.bin" 2>/dev/null || true

          # Remove packages not needed at runtime (~100MB+)
          rm -rf "$NM/onnxruntime-web" "$NM/onnx-proto" "$NM/playwright-core" 2>/dev/null || true

          # Remove pdfjs-dist legacy build (not used)
          rm -rf "$NM/pdfjs-dist/legacy" 2>/dev/null || true

          # Remove source maps, type declarations, docs, tests
          find "$NM" -type f \( -name "*.map" -o -name "*.d.ts" -o -name "*.d.mts" -o -name "*.d.cts" -o -name "README*" -o -name "CHANGELOG*" -o -name "LICENSE*" -o -name "*.md" \) -delete 2>/dev/null || true
          find "$NM" -type d \( -name "test" -o -name "tests" -o -name "__tests__" -o -name "example" -o -name "examples" -o -name "benchmark" -o -name "benchmarks" -o -name "docs" -o -name ".github" \) -exec rm -rf {} + 2>/dev/null || true

          # Remove any remaining broken symlinks
          find "$NM" -xtype l -delete 2>/dev/null || true

          echo "Backend size after pruning: $(du -sh frontend/src-tauri/resources/backend | cut -f1)"

      - name: Copy Bun sidecar
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            arm64) TRIPLE="aarch64-apple-darwin" ;;
            x86_64) TRIPLE="x86_64-apple-darwin" ;;
          esac
          mkdir -p frontend/src-tauri/binaries
          BUN_REAL=$(python3 -c "import os; print(os.path.realpath('$(which bun)'))")
          cp "$BUN_REAL" "frontend/src-tauri/binaries/bun-$TRIPLE"
          chmod +x "frontend/src-tauri/binaries/bun-$TRIPLE"

      - name: Build Tauri (.app only)
        run: cd frontend && npx tauri build --bundles app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arbor-macos-updater
          path: |
            frontend/src-tauri/target/release/bundle/macos/*.app.tar.gz
            frontend/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

      - name: Create DMG
        run: |
          APP_PATH=$(find frontend/src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          hdiutil create -volname "Arbor" -srcfolder "$APP_PATH" -ov -format UDZO "Arbor.dmg"
          echo "DMG created: $(du -h Arbor.dmg | cut -f1)"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: arbor-macos-dmg
          path: Arbor.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            frontend\src-tauri\target
          key: rust-windows-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: rust-windows-

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Stage backend
        shell: pwsh
        run: |
          $ResourcesDir = "frontend/src-tauri/resources"
          if (Test-Path "$ResourcesDir/backend") { Remove-Item -Recurse -Force "$ResourcesDir/backend" }
          New-Item -ItemType Directory -Path "$ResourcesDir/backend" -Force | Out-Null
          Copy-Item -Recurse "backend/src" "$ResourcesDir/backend/src"
          Copy-Item "backend/package.json" "$ResourcesDir/backend/"
          if (Test-Path "backend/bun.lock") { Copy-Item "backend/bun.lock" "$ResourcesDir/backend/" }
          if (Test-Path "backend/native") { Copy-Item -Recurse "backend/native" "$ResourcesDir/backend/native" }
          Push-Location "$ResourcesDir/backend"
          bun install --frozen-lockfile 2>$null
          if ($LASTEXITCODE -ne 0) { bun install }
          Pop-Location

      - name: Prune bundled node_modules
        shell: pwsh
        run: |
          $NM = "frontend/src-tauri/resources/backend/node_modules"
          if (Test-Path $NM) {
            # Remove .bin (bun resolves modules directly, broken symlinks crash Tauri bundler)
            $binDir = Join-Path $NM ".bin"
            if (Test-Path $binDir) { Remove-Item -Recurse -Force $binDir }

            # Remove other-platform dirs
            Get-ChildItem -Path $NM -Recurse -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -in @("linux","darwin","macos") } |
              Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

            # Remove packages not needed at runtime
            @("onnxruntime-web","onnx-proto","playwright-core") | ForEach-Object {
              $p = Join-Path $NM $_
              if (Test-Path $p) { Remove-Item -Recurse -Force $p }
            }

            # Remove pdfjs-dist legacy
            $legacy = Join-Path $NM "pdfjs-dist/legacy"
            if (Test-Path $legacy) { Remove-Item -Recurse -Force $legacy }

            # Remove source maps, type declarations, docs, tests
            Get-ChildItem -Path $NM -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match '\.(map|d\.ts|d\.mts|d\.cts|md)$' -or $_.Name -match '^(README|CHANGELOG|LICENSE)' } |
              Remove-Item -Force -ErrorAction SilentlyContinue
            Get-ChildItem -Path $NM -Recurse -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -in @("test","tests","__tests__","example","examples","benchmark","benchmarks","docs",".github") } |
              Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }
          $size = "{0:N0} MB" -f ((Get-ChildItem -Recurse "frontend/src-tauri/resources/backend" | Measure-Object -Property Length -Sum).Sum / 1MB)
          Write-Host "Backend size after pruning: $size"

      - name: Copy Bun sidecar
        shell: pwsh
        run: |
          $BinDir = "frontend/src-tauri/binaries"
          New-Item -ItemType Directory -Path $BinDir -Force | Out-Null
          $BunExe = (Get-Command bun).Source
          Copy-Item $BunExe "$BinDir/bun-x86_64-pc-windows-msvc.exe"

      - name: Build Tauri
        run: cd frontend && npx tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: arbor-windows-nsis
          path: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/nsis/*.nsis.zip
            frontend/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r .version frontend/src-tauri/tauri.conf.json)
          SHORT_SHA=${GITHUB_SHA::7}
          TAG="v${VERSION}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files + updater manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release

          cp artifacts/arbor-macos-dmg/Arbor.dmg "release/Arbor-${VERSION}-macos.dmg"

          # Windows: find setup exe (robust against multiple files)
          WIN_EXE=$(find artifacts/arbor-windows-nsis -name "*.exe" -not -name "*.sig" -type f | head -1)
          cp "$WIN_EXE" "release/Arbor-${VERSION}-windows-setup.exe"

          # Tauri v2 NSIS updater uses .nsis.zip (not .exe) — copy for release
          WIN_ZIP=$(find artifacts/arbor-windows-nsis -name "*.nsis.zip" -not -name "*.sig" -type f | head -1)
          WIN_ZIP_SIG_FILE=$(find artifacts/arbor-windows-nsis -name "*.nsis.zip.sig" -type f | head -1)
          cp "$WIN_ZIP" "release/Arbor-${VERSION}-windows-setup.nsis.zip"

          # macOS updater artifacts
          cp artifacts/arbor-macos-updater/*.app.tar.gz "release/Arbor.app.tar.gz"
          MAC_SIG=$(cat artifacts/arbor-macos-updater/*.app.tar.gz.sig)
          WIN_SIG=$(cat "$WIN_ZIP_SIG_FILE")

          # latest.json — endpoint the app polls. URLs use releases/latest/download
          # so they survive the v{version}-{sha} tag scheme.
          BASE="https://github.com/painful-bug/arbor/releases/latest/download"
          jq -n \
            --arg v "$VERSION" \
            --arg ms "$MAC_SIG" \
            --arg mu "$BASE/Arbor.app.tar.gz" \
            --arg ws "$WIN_SIG" \
            --arg wu "$BASE/Arbor-${VERSION}-windows-setup.nsis.zip" \
            '{version:$v, pub_date:(now|todateiso8601),
              platforms:{
                "darwin-aarch64":{signature:$ms,url:$mu},
                "windows-x86_64":{signature:$ws,url:$wu}
              }}' > release/latest.json

          ls -lh release/
          cat release/latest.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Arbor ${{ steps.version.outputs.version }} (${{ steps.version.outputs.tag }})
          generate_release_notes: true
          files: release/*
